name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

# Only one publish job at a time
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Test → Build → Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version-bump commit + tag

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so `git log` and tagging work correctly
          fetch-depth: 0
          # Use a token that can push back to the repo
          token: ${{ secrets.GIT_TOKEN }}

      # ── 2. Set up Bun ───────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 3. Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 4. Run tests ────────────────────────────────────────────────
      - name: Run tests
        run: bun test

      # ── 5. Bump version ─────────────────────────────────────────────
      # npm version edits package.json and creates a git commit + tag,
      # but we push them ourselves after the publish succeeds so a failed
      # publish doesn't leave a dangling tag on the remote.
      - name: Bump version (${{ inputs.bump }})
        id: bump
        run: |
          # Tell git who we are for the version commit
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # --no-git-tag-version: we'll create the tag ourselves below
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      # ── 6. Build ────────────────────────────────────────────────────
      - name: Build
        run: bun scripts/build.js

      # ── 7. Publish to npm ────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 8. Commit version bump + push tag ───────────────────────────
      # Only runs if publish succeeded (steps are sequential and any
      # failure exits the job, so reaching this step means npm publish
      # went through).
      - name: Commit version bump and push tag
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}

          git add package.json
          git commit -m "chore: release ${VERSION}"
          git tag "${VERSION}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags
