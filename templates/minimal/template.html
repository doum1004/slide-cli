<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── CJK font-face declarations ── */
  @font-face {
    font-family: 'Noto Serif CJK';
    font-weight: 700;
    src: local('Noto Serif CJK JP Bold'),
         url('file:///usr/share/fonts/opentype/noto/NotoSerifCJK-Bold.ttc') format('truetype');
  }
  @font-face {
    font-family: 'Noto Sans CJK';
    font-weight: 700;
    src: local('Noto Sans CJK JP'),
         url('file:///usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc') format('truetype');
  }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: {{default bg '#0f0e0c'}};
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'DM Mono', 'Noto Sans CJK', 'Courier New', monospace;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }

  /* ── Content wrapper ── */
  .content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    padding: 100px 0 140px;
    min-height: 0;
    position: relative;
    z-index: 1;
  }

  /* No image: center text vertically */
  body.no-image .content {
    justify-content: center;
    padding-top: 0;
    padding-bottom: 0;
  }

  /* ── Zone: heading ── */
  .zone-heading {
    flex: 0 0 auto;
    padding: 0 96px;
  }

  /* ── Zone: image ── */
  .zone-image {
    flex: 0 1 auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
    padding: 32px 48px 0;
    position: relative;
    min-height: 0;
  }

  .slide-image {
    display: block;
    object-fit: contain;
    object-position: center top;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border-radius: 12px;
    flex-shrink: 1;
    min-height: 0;
  }

  /* ── Zone: body ── */
  .zone-body {
    flex: 0 0 auto;
    padding: 32px 96px 0;
  }

  /* ── Spacer: pushes remaining space below body ── */
  .spacer {
    flex: 1 1 auto;
  }

  /* ── Text elements ── */
  .label {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: {{default accent '#c8b89a'}};
    margin-bottom: 48px;
  }

  .rule {
    width: 80px;
    height: 2px;
    background: {{default accent '#c8b89a'}};
    margin-bottom: 48px;
    opacity: 0.7;
  }

  .heading {
    font-family: 'Fraunces', 'Noto Serif CJK', Georgia, 'Times New Roman', serif;
    font-size: 118px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: #f0ece4;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .body-text {
    font-family: 'DM Mono', 'Noto Sans CJK', 'Courier New', monospace;
    font-size: 42px;
    font-weight: 400;
    line-height: 1.65;
    color: {{default accent '#c8b89a'}};
    max-width: 820px;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 64px;
    left: 96px;
    right: 96px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 3;
  }

  .footer-text {
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #6b6560;
  }

  .slide-num {
    font-size: 28px;
    font-weight: 400;
    color: #5a5550;
    letter-spacing: 0.12em;
  }
</style>
</head>
<body class="{{#if image}}has-image{{else}}no-image{{/if}}">

  <div class="content">
    <div class="zone-heading">
      {{#if label}}<div class="label">{{label}}</div>{{/if}}
      <div class="rule"></div>
      <h1 class="heading">{{heading}}</h1>
    </div>

    {{#if image}}
    <div class="zone-image">
      <img class="slide-image" src="{{image}}" alt="">
    </div>
    {{/if}}

    {{#if body}}
    <div class="zone-body">
      <p class="body-text">{{body}}</p>
    </div>
    {{/if}}

    <div class="spacer"></div>
  </div>

  <footer class="footer">
    {{#if footer}}<span class="footer-text">{{footer}}</span>{{else}}<span></span>{{/if}}
    <span class="slide-num">{{slideIndex}} / {{totalSlides}}</span>
  </footer>

</body>
</html>
