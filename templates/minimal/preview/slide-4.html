<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #080d0a;
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'DM Mono', 'Noto Sans CJK', 'Courier New', monospace;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }

  /* ── Top label + rule (pinned to top) ── */
  .zone-label {
    flex: 0 0 auto;
    padding: 100px 96px 0;
    position: relative;
    z-index: 1;
  }

  .label {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #b0c4b8;
    margin-bottom: 48px;
  }

  .rule {
    width: 80px;
    height: 2px;
    background: #b0c4b8;
    opacity: 0.7;
  }

  /* ── Content wrapper (optically above center) ── */
  .content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 0 200px;
    min-height: 0;
    position: relative;
    z-index: 1;
  }

  /* ── Zone: heading ── */
  .zone-heading {
    flex: 0 0 auto;
    padding: 0 96px;
  }

  .heading {
    font-family: 'Fraunces', 'Noto Serif CJK', Georgia, 'Times New Roman', serif;
    font-size: 118px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: #f0ece4;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* ── Zone: image ── */
  .zone-image {
    flex: 0 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 40px 48px 0;
    position: relative;
    min-height: 0;
  }

  .slide-image {
    display: block;
    object-fit: contain;
    object-position: center;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border-radius: 12px;
    flex-shrink: 1;
    min-height: 0;
  }

  /* ── Zone: body ── */
  .zone-body {
    flex: 0 0 auto;
    padding: 40px 96px 0;
  }

  .body-text {
    font-family: 'DM Mono', 'Noto Sans CJK', 'Courier New', monospace;
    font-size: 42px;
    font-weight: 400;
    line-height: 1.65;
    color: #b0c4b8;
    max-width: 820px;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 64px;
    left: 96px;
    right: 96px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 3;
  }

  .footer-text {
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #6b6560;
  }

  .slide-num {
    font-size: 28px;
    font-weight: 400;
    color: #5a5550;
    letter-spacing: 0.12em;
  }
</style>
<style data-system-fonts>
:root {
  --sys-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --sys-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Noto Serif", serif;
  --sys-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
}
body, html, div, span, p, a, li, td, th, label, input, button, textarea, select {
  font-family: var(--sys-sans) !important;
}
h1, h2, h3, h4, h5, h6 {
  font-family: var(--sys-serif) !important;
}
code, pre, kbd, samp, .mono, [class*="mono"] {
  font-family: var(--sys-mono) !important;
}
</style>
</head>
