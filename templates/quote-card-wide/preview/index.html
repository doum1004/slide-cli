<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Words That Moved the World</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1f1f1f;
    --accent: #e8d5b0;
    --accent2: #7c6f5e;
    --text: #d4cfc8;
    --muted: #5a5550;
    --radius: 12px;
    --font-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
    --font-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Noto Serif", serif;
    --checker-light: #e0e0e0;
    --checker-dark: #cccccc;
    --checker-size: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    user-select: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    z-index: 10;
    gap: 12px;
  }

  .title {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .counter {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  .mode-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .mode-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: var(--accent); color: #0a0a0a; }
  .mode-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  main {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 24px 80px;
  }

  .slide-container {
    position: relative;
    height: 100%;
    max-height: calc(100dvh - 140px);
    aspect-ratio: 1920 / 1080;
    transition: opacity 0.15s ease;
  }

  .slide-container.fading { opacity: 0; }

  .slide-frame {
    width: 100%;
    height: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow:
      0 0 0 1px var(--border),
      0 32px 80px rgba(0,0,0,0.6),
      0 8px 24px rgba(0,0,0,0.4);
    background: #000;
    position: relative;
  }

  /* ── Checkerboard transparency indicator ── */
  .slide-frame.transparency-active {
    background-color: var(--checker-light);
    background-image:
      linear-gradient(45deg, var(--checker-dark) 25%, transparent 25%),
      linear-gradient(-45deg, var(--checker-dark) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--checker-dark) 75%),
      linear-gradient(-45deg, transparent 75%, var(--checker-dark) 75%);
    background-size: var(--checker-size) var(--checker-size);
    background-position:
      0 0,
      0 calc(var(--checker-size) / 2),
      calc(var(--checker-size) / 2) calc(var(--checker-size) * -1 / 2),
      calc(var(--checker-size) / -2) 0;
  }

  .slide-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .slide-frame iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    border: none;
    pointer-events: none;
    transform-origin: top left;
  }

  /*
   * In HTML mode with transparency active, make the iframe
   * background transparent so the checkerboard shows through.
   * The iframe itself gets "background: transparent" injected
   * via JS when the grid is on.
   */
  .slide-frame.transparency-active iframe {
    background: transparent;
  }

  .render-badge {
    display: none;
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 3px 7px;
    border-radius: 4px;
    pointer-events: none;
  }
  .needs-render .render-badge { display: block; }

  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    z-index: 5;
  }
  .nav-btn:hover { background: var(--border); border-color: var(--accent2); }
  .nav-btn:active { transform: translateY(-50%) scale(0.95); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-prev { left: 16px; }
  .nav-next { right: 16px; }

  .progress-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--border);
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
  }

  .dot-track {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 60vw;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    padding: 0;
  }
  .dot.active { background: var(--accent); transform: scale(1.4); }
  .dot:hover:not(.active) { background: var(--accent2); }

  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .ctrl-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .ctrl-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
  .ctrl-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .ctrl-btn.active svg { stroke: #0a0a0a; }

  .ctrl-btn.transparency-btn.active {
    background: var(--checker-light);
    color: #333;
    border-color: var(--checker-dark);
  }
  .ctrl-btn.transparency-btn.active svg {
    stroke: #333;
  }

  .speed-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    appearance: none;
    outline: none;
  }
  .speed-select:focus { border-color: var(--accent2); }

  /* ── Hotkey overlay ── */
  .hotkey-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
  }
  .hotkey-overlay.visible {
    opacity: 1;
    visibility: visible;
  }
  .hotkey-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .hotkey-panel {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px 24px;
    width: 380px;
    max-width: 92vw;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 24px 80px rgba(0, 0, 0, 0.6),
      0 8px 24px rgba(0, 0, 0, 0.4);
    animation: panelIn 0.25s ease both;
  }
  @keyframes panelIn {
    from { transform: scale(0.95) translateY(8px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .hotkey-overlay:not(.visible) .hotkey-panel {
    animation: none;
  }
  .hotkey-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .hotkey-title {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hotkey-title svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--accent2);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .hotkey-close {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s ease;
    line-height: 1;
    flex-shrink: 0;
  }
  .hotkey-close:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: var(--border);
  }

  .hotkey-list {
    display: flex;
    flex-direction: column;
  }
  .hotkey-section {
    font-size: 9px;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 12px 0 6px;
  }
  .hotkey-section:first-child { padding-top: 0; }
  .hotkey-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
  .hotkey-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    gap: 16px;
  }
  .hotkey-label {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.01em;
    flex: 1;
    min-width: 0;
  }
  .hotkey-keys {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 24px;
    padding: 0 7px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-width: 3px;
    border-bottom-color: #2a2a2a;
    border-radius: 5px;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    white-space: nowrap;
    line-height: 1;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .hotkey-footer {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .hotkey-footer kbd {
    display: inline-flex;
    vertical-align: middle;
    margin: 0 2px;
    min-width: 20px;
    height: 20px;
    font-size: 9px;
    padding: 0 5px;
  }

  /* ── Intro toast ── */
  .intro-toast {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.04em;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 50;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .intro-toast svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .intro-toast kbd {
    display: inline-flex;
    vertical-align: middle;
    margin: 0 3px;
    min-width: 22px;
    height: 20px;
    font-size: 10px;
    padding: 0 6px;
    border-bottom-width: 2px;
  }
  .intro-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
    cursor: pointer;
  }

  body.fullscreen header,
  body.fullscreen footer { display: none; }
  body.fullscreen main { padding: 0; }
  body.fullscreen .nav-btn { opacity: 0; transition: opacity 0.3s ease; }
  body.fullscreen:hover .nav-btn { opacity: 1; }
  body.fullscreen .slide-container { max-height: 100dvh; }
  body.fullscreen .shortcut-fab { display: flex; }
  body.fullscreen .transparency-fab { display: flex; }

  /* ── Floating buttons (fullscreen) ── */
  .shortcut-fab,
  .transparency-fab {
    display: none;
    position: fixed;
    bottom: 20px;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: all 0.2s ease;
    opacity: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .shortcut-fab { right: 20px; }
  .transparency-fab { right: 68px; }

  .shortcut-fab svg,
  .transparency-fab svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .shortcut-fab:hover,
  .transparency-fab:hover {
    border-color: var(--accent2);
    color: var(--accent);
    background: var(--border);
    opacity: 1 !important;
  }
  .transparency-fab.active {
    background: var(--checker-light);
    border-color: var(--checker-dark);
    color: #555;
    opacity: 1 !important;
  }
  body.fullscreen:hover .shortcut-fab { opacity: 0.6; }
  body.fullscreen:hover .transparency-fab { opacity: 0.6; }
  body.fullscreen:hover .transparency-fab.active { opacity: 1; }

  .slide-frame.loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 24px;
    height: 24px;
    margin: -12px 0 0 -12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    z-index: 2;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    main { padding: 12px 60px; }
    .nav-btn { width: 36px; height: 36px; }
    .nav-prev { left: 8px; }
    .nav-next { right: 8px; }
    .header-right { gap: 6px; }
    .mode-btn { padding: 5px 7px; }
    .hotkey-panel { padding: 20px 18px 18px; width: 100%; }
    footer { gap: 10px; padding: 12px 16px; }
    .ctrl-btn { padding: 6px 10px; font-size: 9px; }
    .ctrl-btn .btn-label { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="title">Words That Moved the World</div>
  <div class="header-right">
    <div class="mode-toggle" id="modeToggle" title="Switch between rendered images and live HTML">
      <button class="mode-btn active" id="btnModeImg"
        onclick="setMode('img')" >
        IMAGE
      </button>
      <button class="mode-btn" id="btnModeHtml" onclick="setMode('html')">
        HTML
      </button>
    </div>
    <div class="counter"><span id="cur">1</span> / 4</div>
  </div>
</header>

<main>
  <button class="nav-btn nav-prev" id="btnPrev" onclick="go(-1)" title="Previous (\u2190)">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div class="slide-container" id="slideContainer">
    <div class="slide-frame" id="slideFrame">
      <img id="slideImg" src="" alt="Slide 1" draggable="false" style="display:none">
      <iframe id="slideIframe" src="" sandbox="allow-scripts allow-same-origin" style="display:none"></iframe>
      <div class="render-badge">no image</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 25.0%"></div>
    </div>
  </div>

  <button class="nav-btn nav-next" id="btnNext" onclick="go(1)" title="Next (\u2192)">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</main>

<footer>
  <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">
    <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    <span class="btn-label">FULL</span>
  </button>
  
  <div class="dot-track" id="dotTrack">
    <button class="dot active" onclick="goTo(0)" title="Slide 1"></button><button class="dot" onclick="goTo(1)" title="Slide 2"></button><button class="dot" onclick="goTo(2)" title="Slide 3"></button><button class="dot" onclick="goTo(3)" title="Slide 4"></button>
  </div>
  <select class="speed-select" id="speedSelect" title="Autoplay speed">
    <option value="2000">2s</option>
    <option value="3000" selected>3s</option>
    <option value="5000">5s</option>
    <option value="8000">8s</option>
  </select>
  <button class="ctrl-btn" id="btnPlay" onclick="togglePlay()" title="Play/Pause (Space)">
    <svg id="playIcon" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg>
    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    <span class="btn-label">PLAY</span>
  </button>
  <button class="ctrl-btn" id="btnShortcuts" onclick="toggleHotkeys()" title="Keyboard Shortcuts (?)">
    <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
    <span class="btn-label">KEYS</span>
  </button>
</footer>

<!-- Floating buttons for fullscreen mode -->

<button class="shortcut-fab" id="shortcutFab" onclick="toggleHotkeys()" title="Keyboard Shortcuts (?)">
  <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
</button>

<!-- Hotkey overlay panel -->
<div class="hotkey-overlay" id="hotkeyOverlay">
  <div class="hotkey-backdrop" onclick="toggleHotkeys()"></div>
  <div class="hotkey-panel">
    <div class="hotkey-header">
      <div class="hotkey-title">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
        Keyboard Shortcuts
      </div>
      <button class="hotkey-close" onclick="toggleHotkeys()" title="Close (Esc)">&times;</button>
    </div>
    <div class="hotkey-list">
      <div class="hotkey-section">Navigation</div>
      <div class="hotkey-row">
        <div class="hotkey-label">Previous slide</div>
        <div class="hotkey-keys"><kbd>\u2190</kbd></div>
      </div>
      <div class="hotkey-row">
        <div class="hotkey-label">Next slide</div>
        <div class="hotkey-keys"><kbd>\u2192</kbd></div>
      </div>
      <div class="hotkey-row">
        <div class="hotkey-label">First slide</div>
        <div class="hotkey-keys"><kbd>Home</kbd></div>
      </div>
      <div class="hotkey-row">
        <div class="hotkey-label">Last slide</div>
        <div class="hotkey-keys"><kbd>End</kbd></div>
      </div>
      <div class="hotkey-divider"></div>
      <div class="hotkey-section">Playback</div>
      <div class="hotkey-row">
        <div class="hotkey-label">Play / Pause</div>
        <div class="hotkey-keys"><kbd>Space</kbd></div>
      </div>
      <div class="hotkey-row">
        <div class="hotkey-label">Fullscreen</div>
        <div class="hotkey-keys"><kbd>F</kbd></div>
      </div>
      <div class="hotkey-divider"></div>
      <div class="hotkey-section">View</div>
      <div class="hotkey-row">
        <div class="hotkey-label">Image / HTML mode</div>
        <div class="hotkey-keys"><kbd>M</kbd></div>
      </div>
      
      <div class="hotkey-row">
        <div class="hotkey-label">Show shortcuts</div>
        <div class="hotkey-keys"><kbd>?</kbd></div>
      </div>
      <div class="hotkey-row">
        <div class="hotkey-label">Exit / Close</div>
        <div class="hotkey-keys"><kbd>Esc</kbd></div>
      </div>
    </div>
    <div class="hotkey-footer">Press <kbd>?</kbd> or <kbd>Esc</kbd> to dismiss</div>
  </div>
</div>

<!-- Intro toast -->
<div class="intro-toast" id="introToast" onclick="toggleHotkeys()">
  <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>
  Press <kbd>?</kbd> for shortcuts
</div>

<script>
  const SLIDE_HTML   = ["slide-1.html","slide-2.html","slide-3.html","slide-4.html"];
  const SLIDE_IMAGES = ["slide-1.jpg","slide-2.jpg","slide-3.jpg","slide-4.jpg"];
  const HAS_IMAGES   = true;
  const IS_PNG       = false;
  const SLIDE_WIDTH  = 1920;
  const SLIDE_HEIGHT = 1080;
  const TOTAL        = 4;

  let current = 0;
  let mode = HAS_IMAGES ? 'img' : 'html';
  let playing = false;
  let timer = null;
  let loadingGeneration = 0;
  let hotkeyOpen = false;
  let transparencyGrid = false;

  const $ = (id) => document.getElementById(id);
  const elCur       = $('cur');
  const elFill      = $('progressFill');
  const elDots      = document.querySelectorAll('.dot');
  const elPrev      = $('btnPrev');
  const elNext      = $('btnNext');
  const elPlay      = $('btnPlay');
  const elPlayIcon  = $('playIcon');
  const elPauseIcon = $('pauseIcon');
  const elImg       = $('slideImg');
  const elContainer = $('slideContainer');
  const elFrame     = $('slideFrame');
  const elBtnImg    = $('btnModeImg');
  const elBtnHtml   = $('btnModeHtml');
  const elHotkeyOverlay = $('hotkeyOverlay');
  const elBtnShortcuts  = $('btnShortcuts');
  const elIntroToast    = $('introToast');
  const elBtnTransparency  = $('btnTransparency');
  const elTransparencyFab  = $('transparencyFab');

  /* ── Transparency grid ── */
  function applyTransparency() {
    const show = transparencyGrid && IS_PNG;
    elFrame.classList.toggle('transparency-active', show);
    if (elBtnTransparency) elBtnTransparency.classList.toggle('active', transparencyGrid);
    if (elTransparencyFab) elTransparencyFab.classList.toggle('active', transparencyGrid);

    // For HTML mode: inject/remove transparent background into all cached iframes
    iframeCache.forEach((iframe, idx) => {
      applyIframeTransparency(iframe, show);
    });
  }

  function applyIframeTransparency(iframe, transparent) {
    try {
      const doc = iframe.contentDocument;
      if (!doc || !doc.documentElement) return;

      const existingStyle = doc.getElementById('__transparency-override');

      if (transparent) {
        if (!existingStyle) {
          const style = doc.createElement('style');
          style.id = '__transparency-override';
          style.textContent = 'html, body { background: transparent !important; }';
          doc.head.appendChild(style);
        }
      } else {
        if (existingStyle) existingStyle.remove();
      }
    } catch (_) {
      // cross-origin iframe — can't touch it, CSS rule on parent handles the iframe element bg
    }
  }

  function toggleTransparency() {
    if (!IS_PNG) return;
    transparencyGrid = !transparencyGrid;
    applyTransparency();
  }

  /* ── Hotkey panel ── */
  function toggleHotkeys() {
    hotkeyOpen = !hotkeyOpen;
    elHotkeyOverlay.classList.toggle('visible', hotkeyOpen);
    elBtnShortcuts.classList.toggle('active', hotkeyOpen);
    if (hotkeyOpen) elIntroToast.classList.remove('show');
  }

  /* ── Image preload ── */
  const imgCache = new Map();

  function preloadImage(idx) {
    if (imgCache.has(idx) || !HAS_IMAGES) return;
    const img = new Image();
    img.src = SLIDE_IMAGES[idx];
    imgCache.set(idx, img);
  }

  function preloadNearby(idx) {
    preloadImage(idx);
    if (idx + 1 < TOTAL) preloadImage(idx + 1);
    if (idx - 1 >= 0) preloadImage(idx - 1);
  }

  /* ── Iframe LRU cache ── */
  const iframeCache = new Map();
  const IFRAME_CACHE_SIZE = 3;
  const iframeLoaded = new Set();

  function getIframe(idx) {
    if (iframeCache.has(idx)) {
      const el = iframeCache.get(idx);
      iframeCache.delete(idx);
      iframeCache.set(idx, el);
      return el;
    }
    if (iframeCache.size >= IFRAME_CACHE_SIZE) {
      const oldest = iframeCache.keys().next().value;
      const oldEl = iframeCache.get(oldest);
      if (oldEl.parentNode) oldEl.remove();
      iframeCache.delete(oldest);
      iframeLoaded.delete(oldest);
    }
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts allow-same-origin';
    iframe.style.cssText = 'position:absolute;top:0;left:0;width:1920px;height:1080px;border:none;pointer-events:none;transform-origin:top left;background:transparent;';
    iframe.src = SLIDE_HTML[idx];

    const markLoaded = () => {
      iframeLoaded.add(idx);
      // Once loaded, inject transparency override if grid is active
      if (transparencyGrid && IS_PNG) {
        applyIframeTransparency(iframe, true);
      }
    };
    iframe.addEventListener('load', markLoaded, { once: true });
    iframe.addEventListener('error', () => { iframeLoaded.add(idx); }, { once: true });

    iframeCache.set(idx, iframe);
    return iframe;
  }

  /* ── Mode ── */
  function setMode(m) {
    if (m === 'img' && elBtnImg.disabled) return;
    mode = m;
    elBtnImg.classList.toggle('active', m === 'img');
    elBtnHtml.classList.toggle('active', m === 'html');
    applyTransparency();
    showSlide(current);
  }

  /* ── Loading guard ── */
  function dismissLoading(gen) {
    if (gen === loadingGeneration) {
      elFrame.classList.remove('loading');
    }
  }

  /* ── Show slide ── */
  function showSlide(idx) {
    const gen = ++loadingGeneration;

    iframeCache.forEach((el) => { el.style.display = 'none'; });

    if (mode === 'img') {
      elImg.style.display = '';
      const cached = imgCache.get(idx);
      elImg.src = (cached && cached.complete) ? cached.src : SLIDE_IMAGES[idx];
      elImg.alt = 'Slide ' + (idx + 1);
      elFrame.classList.remove('loading');
      preloadNearby(idx);
    } else {
      elImg.style.display = 'none';
      const iframe = getIframe(idx);
      if (!iframe.parentNode) elFrame.appendChild(iframe);
      iframe.style.display = '';

      if (iframeLoaded.has(idx)) {
        elFrame.classList.remove('loading');
        // Re-apply transparency in case it was toggled while cached
        if (transparencyGrid && IS_PNG) {
          applyIframeTransparency(iframe, true);
        }
      } else {
        elFrame.classList.add('loading');

        const onReady = () => { dismissLoading(gen); };

        let alreadyComplete = false;
        try {
          alreadyComplete = iframe.contentDocument
            && iframe.contentDocument.readyState === 'complete'
            && iframe.contentDocument.body
            && iframe.contentDocument.body.childNodes.length > 0;
        } catch (_) {}

        if (alreadyComplete) {
          elFrame.classList.remove('loading');
        } else {
          iframe.addEventListener('load', onReady, { once: true });
          iframe.addEventListener('error', onReady, { once: true });
          setTimeout(() => { dismissLoading(gen); }, 8000);
        }
      }

      scaleIframe(iframe);
    }

    applyTransparency();
  }

  function scaleIframe(iframe) {
    if (!iframe || !elFrame) return;
    const cw = elFrame.clientWidth;
    const ch = elFrame.clientHeight;
    if (cw === 0 || ch === 0) return;
    const scale = Math.min(cw / SLIDE_WIDTH, ch / SLIDE_HEIGHT);
    const ox = (cw - SLIDE_WIDTH * scale) / 2;
    const oy = (ch - SLIDE_HEIGHT * scale) / 2;
    iframe.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + scale + ')';
  }

  new ResizeObserver(() => {
    if (mode === 'html') {
      const iframe = iframeCache.get(current);
      if (iframe) scaleIframe(iframe);
    }
  }).observe(elFrame);

  /* ── Nav ── */
  function updateUI() {
    elCur.textContent = current + 1;
    elFill.style.width = ((current + 1) / TOTAL * 100).toFixed(1) + '%';
    elPrev.disabled = current === 0;
    elNext.disabled = current === TOTAL - 1;
    elDots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  let fadeTimer = null;
  function loadSlide(idx) {
    if (idx === current) return;
    if (fadeTimer !== null) {
      clearTimeout(fadeTimer);
      fadeTimer = null;
    }
    elContainer.classList.add('fading');
    current = idx;
    updateUI();
    fadeTimer = setTimeout(() => {
      fadeTimer = null;
      showSlide(idx);
      elContainer.classList.remove('fading');
    }, 120);
  }

  function go(dir) {
    const next = current + dir;
    if (next < 0 || next >= TOTAL) {
      if (playing && next >= TOTAL) stopPlay();
      return;
    }
    loadSlide(next);
  }

  function goTo(idx) {
    if (idx >= 0 && idx < TOTAL) loadSlide(idx);
  }

  /* ── Autoplay ── */
  function togglePlay() { playing ? stopPlay() : startPlay(); }

  function startPlay() {
    if (current >= TOTAL - 1) {
      current = -1;
      loadSlide(0);
    }
    playing = true;
    elPlay.querySelector('.btn-label').textContent = 'PAUSE';
    elPlay.classList.add('active');
    elPlayIcon.style.display = 'none';
    elPauseIcon.style.display = '';
    timer = setInterval(() => go(1), parseInt($('speedSelect').value));
  }

  function stopPlay() {
    playing = false;
    elPlay.querySelector('.btn-label').textContent = 'PLAY';
    elPlay.classList.remove('active');
    elPlayIcon.style.display = '';
    elPauseIcon.style.display = 'none';
    clearInterval(timer);
  }

  /* ── Fullscreen ── */
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
      document.body.classList.add('fullscreen');
    } else {
      document.exitFullscreen?.();
    }
  }
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) document.body.classList.remove('fullscreen');
  });

  /* ── Keyboard ── */
  document.addEventListener('keydown', (e) => {
    if (hotkeyOpen) {
      if (e.key === 'Escape' || e.key === '?') {
        e.preventDefault();
        toggleHotkeys();
      }
      return;
    }

    switch (e.key) {
      case 'ArrowLeft':  go(-1); break;
      case 'ArrowRight': go(1);  break;
      case ' ':          e.preventDefault(); togglePlay(); break;
      case 'f': case 'F': toggleFullscreen(); break;
      case 'm': case 'M': setMode(mode === 'img' ? 'html' : 'img'); break;
      case 't': case 'T': toggleTransparency(); break;
      case 'Escape':
        if (document.fullscreenElement) document.exitFullscreen?.();
        break;
      case 'Home':       goTo(0); break;
      case 'End':        goTo(TOTAL - 1); break;
      case '?':          toggleHotkeys(); break;
    }
  });

  /* ── Touch ── */
  let touchX = 0;
  document.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
  }, { passive: true });

  /* ── Init ── */
  applyTransparency();
  showSlide(0);
  updateUI();
  if (HAS_IMAGES && typeof requestIdleCallback === 'function') {
    requestIdleCallback(() => { for (let i = 0; i < TOTAL; i++) preloadImage(i); });
  }
  setTimeout(() => {
    elIntroToast.classList.add('show');
    setTimeout(() => elIntroToast.classList.remove('show'), 5000);
  }, 600);
</script>

</body>
</html>
