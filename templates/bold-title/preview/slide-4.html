<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif;
  }

  /* ── Full-bleed background image (optional, behind everything) ── */
  .bg-image {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .bg-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Darken image so text always stays readable */
  .bg-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.52);
  }

  /* ── Gradient layer (on top of image if present) ── */
  .gradient-layer {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #0a0a14 0%, #141428 100%);
    z-index: 1;
    /* When image is present, blend the gradient on top */
    mix-blend-mode: multiply;
  }
  body.has-image .gradient-layer {
    opacity: 0.82;
  }

  /* Grid overlay */
  .grid-layer {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 2;
    pointer-events: none;
  }

  /* Radial glow */
  .glow-layer {
    position: absolute;
    top: -200px; left: -200px;
    width: 900px; height: 900px;
    background: radial-gradient(circle, #a78bfa22 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  /* All content sits above the background layers */
  .top-bar, .main, .bottom { position: relative; z-index: 3; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 72px 88px 0;
  }

  .brand-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #a78bfa;
  }

  /* counter: bumped opacity for legibility */
  .slide-counter {
    font-size: 30px; font-weight: 300;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 88px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 52px;
  }
  .eyebrow-line { width: 60px; height: 3px; background: #a78bfa; }
  /* eyebrow: bigger and heavier for mobile legibility */
  .eyebrow-text {
    font-family: 'Outfit', 'Noto Sans CJK', 'Helvetica Neue', Arial, sans-serif;
    font-size: 36px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #a78bfa;
  }

  .title {
    font-family: 'Bebas Neue', 'Noto Sans CJK', Impact, 'Arial Narrow', sans-serif;
    font-size: 176px;
    font-weight: 900;
    line-height: 1.0;
    color: #ffffff;
    margin-bottom: 60px;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* subtitle: higher opacity, slightly larger */
  .subtitle {
    font-family: 'Outfit', 'Noto Sans CJK', 'Helvetica Neue', Arial, sans-serif;
    font-size: 50px;
    font-weight: 700;
    line-height: 1.5;
    color: rgba(255,255,255,0.72);
    max-width: 840px;
    text-wrap: balance;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .bottom { padding: 0 88px 80px; }

  .bottom-rule {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, #a78bfa88, transparent);
    margin-bottom: 48px;
  }

  /* cta: larger and full opacity */
  .cta-text {
    font-size: 40px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.92);
  }

  .bg-num {
    position: absolute;
    right: -20px; bottom: 100px;
    font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
    font-size: 600px; line-height: 1;
    color: rgba(255,255,255,0.03);
    pointer-events: none;
    z-index: 3;
    user-select: none;
  }
</style>
<style data-system-fonts>
:root {
  --sys-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --sys-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Noto Serif", serif;
  --sys-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
}
body, html, div, span, p, a, li, td, th, label, input, button, textarea, select {
  font-family: var(--sys-sans) !important;
}
h1, h2, h3, h4, h5, h6 {
  font-family: var(--sys-serif) !important;
}
code, pre, kbd, samp, .mono, [class*="mono"] {
  font-family: var(--sys-mono) !important;
}
</style>
</head>
