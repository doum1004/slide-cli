<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif;
  }

  /* ── Full-bleed background image (optional, behind everything) ── */
  .bg-image {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .bg-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .bg-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.52);
  }

  /* ── Gradient layer ── */
  .gradient-layer {
    position: absolute;
    inset: 0;
    background: linear-gradient(130deg, #0a0a14 0%, #141428 100%);
    z-index: 1;
    mix-blend-mode: multiply;
  }
  body.has-image .gradient-layer {
    opacity: 0.82;
  }

  /* Grid overlay */
  .grid-layer {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 2;
    pointer-events: none;
  }

  /* Radial glow */
  .glow-layer {
    position: absolute;
    top: -160px; left: -160px;
    width: 800px; height: 800px;
    background: radial-gradient(circle, #a78bfa22 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  /* All content sits above the background layers */
  .top-bar, .main, .bottom { position: relative; z-index: 3; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 48px 80px 0;
  }

  .brand-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #a78bfa;
  }

  .slide-counter {
    font-size: 22px; font-weight: 300;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 0 80px;
    gap: 80px;
  }

  /* Left column: eyebrow + title */
  .main-left {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Right column: subtitle */
  .main-right {
    flex: 0 0 540px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .eyebrow-line { width: 48px; height: 3px; background: #a78bfa; }
  .eyebrow-text {
    font-family: 'Outfit', 'Noto Sans CJK', 'Helvetica Neue', Arial, sans-serif;
    font-size: 24px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #a78bfa;
  }

  .title {
    font-family: 'Bebas Neue', 'Noto Sans CJK', Impact, 'Arial Narrow', sans-serif;
    font-size: 148px;
    font-weight: 900;
    line-height: 0.95;
    color: #ffffff;
    text-wrap: balance;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .subtitle {
    font-family: 'Outfit', 'Noto Sans CJK', 'Helvetica Neue', Arial, sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.55;
    color: rgba(255,255,255,0.72);
    text-wrap: balance;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .bottom { padding: 0 80px 48px; }

  .bottom-rule {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, #a78bfa88, transparent);
    margin-bottom: 28px;
  }

  .cta-text {
    font-size: 26px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.92);
  }

  .bg-num {
    position: absolute;
    right: -10px; bottom: 40px;
    font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif;
    font-size: 380px; line-height: 1;
    color: rgba(255,255,255,0.03);
    pointer-events: none;
    z-index: 3;
    user-select: none;
  }
</style>
<style data-system-fonts>
:root {
  --sys-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --sys-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Noto Serif", serif;
  --sys-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
}
body, html, div, span, p, a, li, td, th, label, input, button, textarea, select {
  font-family: var(--sys-sans) !important;
}
h1, h2, h3, h4, h5, h6 {
  font-family: var(--sys-serif) !important;
}
code, pre, kbd, samp, .mono, [class*="mono"] {
  font-family: var(--sys-mono) !important;
}
</style>
</head>
