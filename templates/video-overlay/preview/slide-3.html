<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  body {
    position: relative;
  }

  /* ─────────────────────────────────────
     SAFE ZONE REFERENCE

     Top dead zone:     0 – 200px   (platform headers, tabs)
     Right dead zone:   920 – 1080px, y 1000–1600px (action buttons)
     Bottom dead zone:  1600 – 1920px (captions, usernames, audio)

     Safe rect:
       top:    200px
       bottom: 1600px  (safe height = 1400px)
       left:   64px
       right:  900px   (avoids right-side action buttons)
       full-width right: 1016px (when no action buttons at that y)
     ───────────────────────────────────── */

  /* ─────────────────────────────────────
     POSITIONED CONTENT
     ───────────────────────────────────── */

  .content-anchor {
    position: absolute;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    max-width: 840px;
  }

  /* safe-bottom: sits just above the bottom dead zone, avoids right buttons */
  .pos-safe-bottom {
    bottom: 400px;
    left: 64px;
    max-width: 840px;
  }

  /* safe-top: sits just below the top dead zone */
  .pos-safe-top {
    top: 300px;
    left: 64px;
    max-width: 840px;
  }

  /* safe-center: centered in the safe rectangle, shifted slightly below true center */
  .pos-safe-center {
    top: 70%;
    left: 50%;
    transform: translate(-50%, -55%);
    align-items: center;
    text-align: center;
    max-width: 900px;
  }

  .pos-safe-center .headline-text {
    font-size: 45px;
  }

  .pos-safe-center .subtitle-text {
    font-size: 30px;
  }

  /* safe-left: vertically centered, hugging left edge */
  .pos-safe-left {
    top: 50%;
    left: 64px;
    transform: translateY(-55%);
    max-width: 780px;
  }

  /* safe-right: vertically centered, right side but above action buttons */
  .pos-safe-right {
    top: 340px;
    right: 64px;
    align-items: flex-end;
    text-align: right;
    max-width: 780px;
  }

  /* ─── Backdrop pill ─── */
  .backdrop {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: rgba(0, 0, 0, 0.05);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Text block ─── */
  .text-block {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 44px 48px;
  }

  .text-block-bare {
    padding: 0;
  }

  .label-text {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #d47e7e;
    line-height: 1.2;
    text-wrap: balance;
  }

  .rule {
    width: 56px;
    height: 3px;
    background: #d47e7e;
  }

  .headline-text {
    font-size: 60px;
    font-weight: 700;
    line-height: 1.12;
    letter-spacing: -0.01em;
    color: #ffffff;
    text-shadow: 0 3px 16px rgba(0, 0, 0, 0.55);
    text-wrap: balance;
  }

  .subtitle-text {
    font-size: 36px;
    font-weight: 400;
    line-height: 1.45;
    color: #ffffff;
    opacity: 0.85;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    text-wrap: balance;
  }

  /* ─── Circular image ─── */
  .slot-image {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 3px solid #d47e7e;
    z-index: 2;
  }

  /* ─────────────────────────────────────
     LOWER-THIRD MODE
     Positioned ABOVE the bottom dead zone
     (bottom: 320px puts it at y≈1600 — right
     at the top edge of the platform UI area)
     ───────────────────────────────────── */

  .lower-third-bg {
    position: absolute;
    left: 0; right: 0;
    bottom: 320px;
    height: 280px;
    background: linear-gradient(
      to top,
      rgba(0, 0, 0, 0.78) 0%,
      rgba(0, 0, 0, 0.50) 60%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 0;
  }

  .lower-third-accent-line {
    position: absolute;
    left: 0; right: 0;
    bottom: 320px;
    height: 5px;
    background: #d47e7e;
    z-index: 3;
  }

  .lower-third-content {
    position: absolute;
    left: 64px; right: 64px;
    bottom: 348px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 28px;
    z-index: 2;
  }

  .lower-third-content .slot-image {
    width: 88px;
    height: 88px;
  }

  .lower-third-content .text-block {
    padding: 0;
    gap: 8px;
  }

  .lower-third-content .headline-text {
    font-size: 50px;
  }

  .lower-third-content .subtitle-text {
    font-size: 30px;
    opacity: 0.8;
  }

  .lower-third-content .label-text {
    font-size: 22px;
  }

  /* ─── Counter ─── */
  .counter {
    position: absolute;
    top: 210px; right: 56px;
    font-family: 'Courier New', monospace;
    font-size: 24px;
    color: #ffffff;
    opacity: 0.28;
    z-index: 2;
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
    text-wrap: balance;
  }
</style>
<style data-system-fonts>
:root {
  --sys-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --sys-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Noto Serif", serif;
  --sys-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
}
body, html, div, span, p, a, li, td, th, label, input, button, textarea, select {
  font-family: var(--sys-sans) !important;
}
h1, h2, h3, h4, h5, h6 {
  font-family: var(--sys-serif) !important;
}
code, pre, kbd, samp, .mono, [class*="mono"] {
  font-family: var(--sys-mono) !important;
}
</style>
</head>
<body>


    <div class="lower-third-bg"></div>
    <div class="lower-third-accent-line"></div>
    <div class="lower-third-content">
      
      <div class="text-block">
        <div class="headline-text">Jane Smith</div>
        <div class="subtitle-text">Creative Director, Acme</div>
      </div>
    </div>


</body>
</html>
