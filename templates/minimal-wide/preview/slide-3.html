<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #090c14;
  }

  body {
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: 'DM Mono', 'Noto Sans CJK', 'Courier New', monospace;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }

  /* ── Content row ── */
  .zone-content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    min-height: 0;
    position: relative;
    z-index: 1;
  }

  /* ── Text column ── */
  .zone-text {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 88px;
  }

  /* ── Image column ── */
  .zone-image {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .slide-image {
    display: block;
    object-fit: contain;
    object-position: center center;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
  }

  /* ── No image: text fills full width ── */
  body.no-image .zone-image { display: none; }
  body.no-image .zone-text  { padding: 64px 180px; }

  /* ── img-right (default): text left, image right ── */
  body.img-right .zone-text  { flex: 0 0 900px; }
  body.img-right .zone-image {
    flex: 1 1 0;
    padding: 48px 48px 48px 0;
  }
  body.img-right .slide-image {
    border-radius: 12px;
  }
  /* Fade left edge of image into bg */
  body.img-right .zone-image::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 80px;
    background: linear-gradient(to right, #090c14, transparent);
    z-index: 2;
    pointer-events: none;
  }

  /* ── img-left: image left, text right ── */
  body.img-left .zone-content { flex-direction: row-reverse; }
  body.img-left .zone-text  { flex: 0 0 900px; }
  body.img-left .zone-image {
    flex: 1 1 0;
    padding: 48px 0 48px 48px;
  }
  body.img-left .slide-image {
    border-radius: 12px;
  }
  body.img-left .zone-image::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 80px;
    background: linear-gradient(to left, #090c14, transparent);
    z-index: 2;
    pointer-events: none;
  }

  /* ── Text elements ── */
  .label {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #a8b8d0;
    margin-bottom: 28px;
  }

  .rule {
    width: 64px;
    height: 2px;
    background: #a8b8d0;
    margin-bottom: 36px;
    opacity: 0.7;
  }

  .heading {
    font-family: 'Fraunces', 'Noto Serif CJK', Georgia, 'Times New Roman', serif;
    font-size: 88px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: #f0ece4;
    margin-bottom: 32px;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .body-text {
    font-family: 'DM Mono', 'Noto Sans CJK', 'Courier New', monospace;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.65;
    color: #a8b8d0;
    max-width: 760px;
    text-wrap: pretty;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 40px;
    left: 88px;
    right: 88px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 3;
  }

  .footer-text {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #6b6560;
  }

  .slide-num {
    font-size: 20px;
    font-weight: 400;
    color: #5a5550;
    letter-spacing: 0.12em;
  }
</style>
<style data-system-fonts>
:root {
  --sys-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --sys-serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Noto Serif", serif;
  --sys-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "DejaVu Sans Mono", monospace;
}
body, html, div, span, p, a, li, td, th, label, input, button, textarea, select {
  font-family: var(--sys-sans) !important;
}
h1, h2, h3, h4, h5, h6 {
  font-family: var(--sys-serif) !important;
}
code, pre, kbd, samp, .mono, [class*="mono"] {
  font-family: var(--sys-mono) !important;
}
</style>
</head>
<body class="no-image">

  <div class="zone-content">
    <div class="zone-text">
      
      <div class="rule"></div>
      <h1 class="heading">Type is voice</h1>
      
    </div>

  </div>

  <footer class="footer">
    <span></span>
    <span class="slide-num">3 / 5</span>
  </footer>

</body>
</html>
