<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: {{bg}}; }
  body { display: flex; flex-direction: column; justify-content: center; padding: 96px; }
  h1 { font-size: 120px; color: #fff; }
  p  { font-size: 48px; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
  {{#if image}}<img src="{{image}}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">{{/if}}
  <h1>{{title}}</h1>
  {{#if subtitle}}<p>{{subtitle}}</p>{{/if}}
  <footer style="position:absolute;bottom:60px;right:80px;color:rgba(255,255,255,0.3);font-size:28px">
    {{slideIndex}} / {{totalSlides}}
  </footer>
</body>
</html>
